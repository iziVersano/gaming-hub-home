name: Deploy Backend to Render

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/api/**'
  workflow_dispatch:

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret not set — backend must be deployed manually from the Render dashboard."
            echo "To enable auto-deploy: Render dashboard → consoltech-api → Settings → Deploy Hook, then add the URL as a repo secret named RENDER_DEPLOY_HOOK_URL."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Render deploy triggered."
