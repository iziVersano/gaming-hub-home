<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Nintendo red background pill - left -->
  <rect x="0" y="10" width="100" height="100" rx="50" ry="50" fill="#E4000F"/>
  <!-- Nintendo Switch icon white -->
  <text x="50" y="72" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">⊕</text>
  <!-- NINTENDO text -->
  <text x="130" y="48" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" letter-spacing="2">NINTENDO</text>
  <!-- SWITCH text red -->
  <text x="130" y="88" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#E4000F" letter-spacing="-1">SWITCH</text>
  <!-- 2 text -->
  <text x="420" y="95" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="white">2</text>
</svg>
